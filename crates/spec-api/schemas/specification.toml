# Specification type schema for "specification"
#
# Defines the lifecycle state machine for software specifications tracked by
# spec-api. Edit or copy this file to define custom spec workflows; load custom
# schemas with `SchemaRegistry::load_file` / `load_dir`.
#
# Schema format: serde-compatible TOML representation of EntityTypeSchema.
#   - fields: BTreeMap<field_name, {field_type, required}>
#   - states: list of valid state names (ordered by lifecycle progression)
#   - transitions: list of {from, to} pairs defining the state machine
#   - edge_rules: BTreeMap<kind_name, {directed, acyclic_enforced}>
#   - required_states: states that must appear in history before terminal
#   - terminal_states: states that trigger the required_states check

type_id = "specification"

states = [
    "draft",
    "reviewed",
    "approved",
    "implemented",
    "verified",
    "deprecated",
    "cancelled",
]

# States that must appear in a spec's history before it can reach a terminal
# state (verified). This enforces that every spec passes through formal review
# and approval before being considered complete.
required_states = ["reviewed", "approved"]

# Terminal states that trigger the required_states check.
# "verified" is the success terminal; "deprecated" and "cancelled" are
# exit paths that do not require the full review/approval history.
terminal_states = ["verified"]

# ── State machine transitions ──────────────────────────────────────────────────

# From draft
[[transitions]]
from = "draft"
to = "reviewed"

[[transitions]]
from = "draft"
to = "cancelled"

# From reviewed
[[transitions]]
from = "reviewed"
to = "approved"

[[transitions]]
from = "reviewed"
to = "draft"

[[transitions]]
from = "reviewed"
to = "cancelled"

# From approved
[[transitions]]
from = "approved"
to = "implemented"

[[transitions]]
from = "approved"
to = "deprecated"

[[transitions]]
from = "approved"
to = "cancelled"

# From implemented
[[transitions]]
from = "implemented"
to = "verified"

[[transitions]]
from = "implemented"
to = "approved"

[[transitions]]
from = "implemented"
to = "cancelled"

# From verified (success terminal — only deprecation path remains)
[[transitions]]
from = "verified"
to = "deprecated"

# ── Field definitions ──────────────────────────────────────────────────────────
# Required fields must be present in every spec manifest of this type.
# Optional fields are indexed when present.

[fields.title]
field_type = "string"
required = true

[fields.slug]
field_type = "string"
required = true

[fields.type]
field_type = "string"
required = true

[fields.state]
field_type = "string"
required = false

[fields.component]
field_type = "string"
required = false

[fields.scope]
field_type = "string"
required = false

[fields.parent]
field_type = "string"
required = false

# ── Edge rules ─────────────────────────────────────────────────────────────────

[edge_rules.depends_on]
directed = true
acyclic_enforced = true

[edge_rules.linked]
directed = false
acyclic_enforced = false

# parent_of enables hierarchical spec relationships (e.g. epic → child specs).
# Not present in ticket schemas — this is spec-specific.
[edge_rules.parent_of]
directed = true
acyclic_enforced = true
