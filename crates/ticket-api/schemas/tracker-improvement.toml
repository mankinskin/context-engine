# Ticket type schema for "tracker-improvement"
#
# This is the built-in workflow schema used for tracking implementation work,
# bug fixes, and release governance. Edit or copy this file to define custom
# ticket types; load custom schemas with `ticket --schema-dir <dir>`.
#
# Schema format: serde-compatible TOML representation of TicketTypeSchema.
#   - fields: BTreeMap<field_name, {field_type, required}>
#   - states: list of valid state names
#   - transitions: list of {from, to} pairs defining the state machine
#   - edge_rules: BTreeMap<kind_name, {directed, acyclic_enforced}>

type_id = "tracker-improvement"

states = [
    "new",
    "in-refinement",
    "ready",
    "in-implementation",
    "in-review",
    "in-validation",
    "done",
    "cancelled",
]

# States that must appear in a ticket's history before it can reach a terminal
# state (done). This enforces that every ticket passes through review.
required_states = ["in-review"]

# ── State machine transitions ──────────────────────────────────────────────────

[[transitions]]
from = "new"
to = "in-refinement"

[[transitions]]
from = "new"
to = "cancelled"

[[transitions]]
from = "in-refinement"
to = "ready"

[[transitions]]
from = "in-refinement"
to = "new"

[[transitions]]
from = "in-refinement"
to = "cancelled"

[[transitions]]
from = "ready"
to = "in-implementation"

[[transitions]]
from = "ready"
to = "in-refinement"

[[transitions]]
from = "ready"
to = "cancelled"

[[transitions]]
from = "in-implementation"
to = "in-review"

[[transitions]]
from = "in-implementation"
to = "cancelled"

[[transitions]]
from = "in-review"
to = "in-validation"

[[transitions]]
from = "in-review"
to = "in-implementation"

[[transitions]]
from = "in-review"
to = "cancelled"

[[transitions]]
from = "in-validation"
to = "done"

[[transitions]]
from = "in-validation"
to = "in-review"

[[transitions]]
from = "in-validation"
to = "cancelled"

# ── Field definitions ──────────────────────────────────────────────────────────
# Required fields must be present in every manifest of this type.
# Optional fields are indexed when present.

[fields.title]
field_type = "string"
required = true

[fields.type]
field_type = "string"
required = true

[fields.state]
field_type = "string"
required = false

[fields.component]
field_type = "string"
required = false

[fields.risk_level]
field_type = "string"
required = false

[fields.acceptance_criteria]
field_type = "string"
required = false

[fields.validation_plan]
field_type = "string"
required = false

[fields.validation_status]
field_type = "string"
required = false

[fields.validator_id]
field_type = "string"
required = false

[fields.release_target]
field_type = "string"
required = false

[fields.release_version]
field_type = "string"
required = false

[fields.bootstrap_blocker]
field_type = "boolean"
required = false

[fields.rollout_stage]
field_type = "string"
required = false

[fields.doc_category]
field_type = "string"
required = false

[fields.tags]
field_type = "string"
required = false

[fields.workflow_stage]
field_type = "string"
required = false

[fields.priority]
field_type = "string"
required = false

[fields.source_agent_files]
field_type = "string"
required = false

[fields.bug_validity]
field_type = "string"
required = false

[fields.phase]
field_type = "string"
required = false

# ── Edge kind rules ────────────────────────────────────────────────────────────

[edge_rules.depends_on]
directed = true
acyclic_enforced = true

[edge_rules.linked]
directed = false
acyclic_enforced = false
