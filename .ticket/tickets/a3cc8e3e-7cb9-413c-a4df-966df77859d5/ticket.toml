acceptance_criteria = "1. `ticket update <id> --undo` reverts the most recent history step by calling apply_revert with the previous revision's fields. 2. --undo is the default behavior for resolving invalid state transitions: if a forward state transition fails, the system suggests --undo automatically. 3. --undo creates a new forward-only history revision (no erasure). 4. Works via CLI and MCP. 5. Existing revert command continues to work for arbitrary revision targets."
