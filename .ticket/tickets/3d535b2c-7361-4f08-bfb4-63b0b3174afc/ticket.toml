acceptance_criteria = "1. A prompt-time (UserPromptSubmit) bootstrap hook script exists under tools/agent-hooks/ and is referenced from the root hook configuration alongside the existing PreToolUse/PostToolUse/Stop hooks. 2. The hook reads the prompt, resolves ticket/owner context, and calls the session-api check-in surface to obtain the authoritative worktree path, branch, and allocation mode without synthesizing the path itself. 3. The hook injects the resolved worktree path via hookSpecificOutput.additionalContext so the agent operates from that directory. 4. Reuse vs rotation follows the spec contract with rotation as the default handoff path; the hook never silently transfers board ownership. 5. Existing hook reminders remain functional and a focused simulated hook invocation proves the bootstrap path resolves and injects a worktree path."
