[config]
skip_core_tasks = true
default_to_workspace = false

# ── Viewer default ports (override with PORT env var when launching) ──────────
[env]
LOG_VIEWER_PORT    = "3000"
DOC_VIEWER_PORT    = "3001"
TICKET_VIEWER_PORT = "3002"
SPEC_VIEWER_PORT   = "4002"

# ─────────────────────────────────────────────────────────────────────────────
# build-all — single target that compiles every deployable tool binary and
# every viewer frontend artifact.  Use this to verify nothing is broken after
# a cross-cutting change.
#
#   cargo make build-all
#
# Individual sub-targets can be run independently:
#   cargo make build-native-tools   — all Rust CLI/HTTP/MCP/viewer binaries
#   cargo make build-all-frontends  — all Vite + Trunk frontend bundles
# ─────────────────────────────────────────────────────────────────────────────

[tasks.build-all]
description = "Build all native tool binaries AND all viewer frontend artifacts"
dependencies = [
  "build-native-tools",
  "build-all-frontends",
]

# ── Native (Rust) binaries ────────────────────────────────────────────────────

[tasks.build-native-tools]
description = "Build every deployable Rust binary (CLI, HTTP, MCP, viewers, utilities)"
dependencies = [
  "build-cli-tools",
  "build-http-tools",
  "build-mcp-tools",
  "build-viewers",
  "build-viewer-ctl",
  "build-misc-tools",
]

[tasks.build-cli-tools]
description = "Build context-cli, spec-cli, and ticket-cli (release)"
command = "cargo"
args = ["build", "--release", "-p", "context-cli", "-p", "spec-cli", "-p", "ticket-cli"]

[tasks.build-http-tools]
description = "Build context-http, spec-http, and ticket-http (release)"
command = "cargo"
args = ["build", "--release", "-p", "context-http", "-p", "spec-http", "-p", "ticket-http"]

[tasks.build-mcp-tools]
description = "Build context-mcp, spec-mcp, ticket-mcp, and mcp-runner (release)"
command = "cargo"
args = ["build", "--release", "-p", "context-mcp", "-p", "spec-mcp", "-p", "ticket-mcp", "-p", "mcp-runner"]

[tasks.build-viewer-ctl]
description = "Build the viewer-ctl lifecycle manager binary (release)"
command = "cargo"
args = ["build", "--release", "-p", "viewer-ctl"]

[tasks.build-misc-tools]
description = "Build tracing-analyzer (release)"
command = "cargo"
args = ["build", "--release", "-p", "tracing-analyzer"]

# ── Viewer frontend artifacts (Vite + Trunk WASM) ────────────────────────────

[tasks.build-all-frontends]
description = "Build all viewer frontend bundles (Vite for doc/log, Trunk/WASM for ticket/spec)"
dependencies = [
  "build-frontend-doc-viewer",
  "build-frontend-log-viewer",
  "build-frontend-ticket-viewer",
  "build-frontend-spec-viewer",
]

[tasks.build-frontend-doc-viewer]
description = "Build the doc-viewer Vite frontend"
command = "viewer-ctl"
args = ["build", "doc-viewer"]

[tasks.build-frontend-log-viewer]
description = "Build the log-viewer Vite frontend"
command = "viewer-ctl"
args = ["build", "log-viewer"]

[tasks.build-frontend-ticket-viewer]
description = "Build the ticket-viewer Trunk/Dioxus frontend"
command = "viewer-ctl"
args = ["build", "ticket-viewer"]

[tasks.build-frontend-spec-viewer]
description = "Build the spec-viewer Trunk/Dioxus frontend"
command = "viewer-ctl"
args = ["build", "spec-viewer"]


# All viewer tasks use viewer-ctl as their runtime.
# ─────────────────────────────────────────────────────────────────────────────

[tasks.install-viewer-ctl]
description = "Install viewer-ctl to ~/.cargo/bin (lifecycle manager)"
command = "cargo"
args = ["install", "--path", "tools/viewer/viewer-ctl", "--force"]

# ─────────────────────────────────────────────────────────────────────────────
# Build — compile viewer server binaries in release mode only.
# Frontend artifacts are NOT built here; use start-* tasks for that.
# ─────────────────────────────────────────────────────────────────────────────

[tasks.build-viewers]
description = "Build all viewer server binaries (release)"
dependencies = [
  "build-doc-viewer",
  "build-log-viewer",
  "build-ticket-viewer",
  "build-spec-viewer",
]

[tasks.build-doc-viewer]
description = "Build the doc-viewer server binary (release)"
command = "cargo"
args = ["build", "--release", "-p", "doc-viewer"]

[tasks.build-log-viewer]
description = "Build the log-viewer server binary (release)"
command = "cargo"
args = ["build", "--release", "-p", "log-viewer"]

[tasks.build-ticket-viewer]
description = "Build the ticket-viewer server binary (release)"
command = "cargo"
args = ["build", "--release", "-p", "ticket-viewer"]

[tasks.build-spec-viewer]
description = "Build the spec-viewer server binary (release)"
command = "cargo"
args = ["build", "--release", "-p", "spec-viewer"]

# ─────────────────────────────────────────────────────────────────────────────
# Install — install viewer server binaries to ~/.cargo/bin via viewer-ctl.
# ─────────────────────────────────────────────────────────────────────────────

[tasks.install-viewers]
description = "Install all viewer server binaries to ~/.cargo/bin"
dependencies = [
  "install-doc-viewer",
  "install-log-viewer",
  "install-ticket-viewer",
  "install-spec-viewer",
]

[tasks.install-doc-viewer]
description = "Install doc-viewer to ~/.cargo/bin"
command = "viewer-ctl"
args = ["install", "doc-viewer"]

[tasks.install-log-viewer]
description = "Install log-viewer to ~/.cargo/bin"
command = "viewer-ctl"
args = ["install", "log-viewer"]

[tasks.install-ticket-viewer]
description = "Install ticket-viewer to ~/.cargo/bin"
command = "viewer-ctl"
args = ["install", "ticket-viewer"]

[tasks.install-spec-viewer]
description = "Install spec-viewer to ~/.cargo/bin"
command = "viewer-ctl"
args = ["install", "spec-viewer"]

# ─────────────────────────────────────────────────────────────────────────────
# Start — build frontend artifacts, auto-install the server binary if not
# already in ~/.cargo/bin, then launch it directly.
# To force a reinstall after source changes: cargo make install-<viewer>
# Override the port: PORT=4010 cargo make start-spec-viewer
# ─────────────────────────────────────────────────────────────────────────────

[tasks.start-doc-viewer]
description = "Build frontend, auto-install if needed, start doc-viewer on port ${DOC_VIEWER_PORT}"
command = "viewer-ctl"
args = ["start", "doc-viewer"]

[tasks.start-log-viewer]
description = "Build frontend, auto-install if needed, start log-viewer on port ${LOG_VIEWER_PORT}"
command = "viewer-ctl"
args = ["start", "log-viewer"]

[tasks.start-ticket-viewer]
description = "Build frontend, auto-install if needed, start ticket-viewer on port ${TICKET_VIEWER_PORT}"
command = "viewer-ctl"
args = ["start", "ticket-viewer"]

[tasks.start-spec-viewer]
description = "Build frontend, auto-install if needed, start spec-viewer on port ${SPEC_VIEWER_PORT}"
command = "viewer-ctl"
args = ["start", "spec-viewer"]

# ─────────────────────────────────────────────────────────────────────────────
# Stop — detect and kill the viewer server listening on its port.
# Prints process details and the manual kill command if auto-kill fails.
# ─────────────────────────────────────────────────────────────────────────────

[tasks.stop-doc-viewer]
description = "Stop the doc-viewer server (kills process on port ${DOC_VIEWER_PORT})"
command = "viewer-ctl"
args = ["stop", "doc-viewer"]

[tasks.stop-log-viewer]
description = "Stop the log-viewer server (kills process on port ${LOG_VIEWER_PORT})"
command = "viewer-ctl"
args = ["stop", "log-viewer"]

[tasks.stop-ticket-viewer]
description = "Stop the ticket-viewer server (kills process on port ${TICKET_VIEWER_PORT})"
command = "viewer-ctl"
args = ["stop", "ticket-viewer"]

[tasks.stop-spec-viewer]
description = "Stop the spec-viewer server (kills process on port ${SPEC_VIEWER_PORT})"
command = "viewer-ctl"
args = ["stop", "spec-viewer"]

[tasks.stop-viewers]
description = "Stop all running viewer servers"
dependencies = [
  "stop-doc-viewer",
  "stop-log-viewer",
  "stop-ticket-viewer",
  "stop-spec-viewer",
]

# ─────────────────────────────────────────────────────────────────────────────
# TypeScript type generation — replaces scripts/generate-types.sh
# Generates ts-rs bindings from Rust crates, then builds @context-engine/types.
# ─────────────────────────────────────────────────────────────────────────────

[tasks.gen-types]
description = "Generate TypeScript types from Rust ts-rs exports and build the npm package"
command = "viewer-ctl"
args = ["gen-types"]

# ─────────────────────────────────────────────────────────────────────────────
# VS Code extension — replaces tools/ticket-vscode/build-and-install.sh
# ─────────────────────────────────────────────────────────────────────────────

[tasks.build-vscode-ext]
description = "Compile the ticket-vscode extension TypeScript (npm run compile)"
command = "viewer-ctl"
args = ["vscode-ext", "build"]

[tasks.install-vscode-ext]
description = "Compile and install ticket-vscode into the VS Code extensions directory"
command = "viewer-ctl"
args = ["vscode-ext", "install"]
