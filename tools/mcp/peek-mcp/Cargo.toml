[package]
name = "peek-mcp"
version = "0.1.0"
edition = "2024"
description = "MCP server for peek-api named inspection tools"

[[bin]]
name = "peek-mcp"
path = "src/main.rs"

[lib]
name = "peek_mcp"
path = "src/lib.rs"

[dependencies]
peek-api = { path = "../../peek-api" }

rmcp = { version = "0.14", features = ["server", "transport-io"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
tokio = { version = "1", features = ["full"] }
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }

[dev-dependencies]
tempfile = "3"