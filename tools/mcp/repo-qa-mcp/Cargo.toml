[package]
name = "repo-qa-mcp"
version = "0.1.0"
edition = "2024"
description = "MCP server for repository quality audits with a synchronized local index"

[[bin]]
name = "repo-qa-mcp"
path = "src/main.rs"

[[bin]]
name = "repo-qa"
path = "src/bin/repo-qa.rs"

[lib]
name = "repo_qa_mcp"
path = "src/lib.rs"

[dependencies]
clap = { version = "4", features = ["derive"] }
rmcp = { version = "0.14", features = ["server", "transport-io"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
tokio = { version = "1", features = ["full"] }
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }
chrono = { version = "0.4", features = ["serde"] }
cargo_metadata = "0.19"
ignore = "0.4"
proc-macro2 = { version = "1", features = ["span-locations"] }
rusqlite = { version = "0.32", features = ["bundled"] }
sha2 = "0.10"
syn = { version = "2", features = ["full", "visit"] }
thiserror = "2"

[dev-dependencies]
assert_cmd = "2"
predicates = "3"
tempfile = "3"
