[package]
name = "ticket-mcp"
version = "0.1.0"
edition = "2024"
description = "MCP server for ticket-api with direct store access (no HTTP backend required)"

[[bin]]
name = "ticket-mcp"
path = "src/main.rs"

[lib]
name = "ticket_mcp"
path = "src/lib.rs"

[dependencies]
ticket-api = { path = "../../../crates/ticket-api" }
rmcp = { version = "0.14", features = ["server", "transport-io"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
chrono = { version = "0.4", features = ["serde"] }
uuid = { version = "1", features = ["serde", "v4"] }
tokio = { version = "1", features = ["full"] }
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }

[dev-dependencies]
tempfile = "3"
