[package]
name = "viewer-api-dioxus"
version = "0.1.0"
edition = "2021"

[[bin]]
name = "viewer-api-dioxus"
path = "src/main.rs"

[dependencies]
dioxus = { version = "0.7", features = ["web"] }

# wasm32-specific dependencies
[target.'cfg(target_arch = "wasm32")'.dependencies]
wasm-bindgen = "0.2"
web-sys = { version = "0.3", features = [
    "Window",
    "Document",
    "HtmlElement",
    "HtmlCanvasElement",
    "Element",
] }

