[package]
name = "viewer-api-dioxus"
version = "0.1.0"
edition = "2021"

[lib]
crate-type = ["rlib"]
path = "src/lib.rs"

[[bin]]
name = "viewer-api-dioxus"
path = "src/main.rs"

[dependencies]
dioxus = { version = "0.7", features = ["web"] }
pulldown-cmark = { version = "0.12", default-features = false, features = ["html"] }
syntect = { version = "5.3", default-features = false, features = ["default-fancy"] }

# wasm32-specific dependencies
[target.'cfg(target_arch = "wasm32")'.dependencies]
wasm-bindgen = "0.2"
wasm-bindgen-futures = "0.4"
js-sys = "0.3"
gloo-events = "0.2"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["registry", "env-filter"] }
tracing-wasm = "0.2"
web-sys = { version = "0.3", features = [
    "Window",
    "Document",
    "HtmlElement",
    "HtmlBodyElement",
    "HtmlCanvasElement",
    "HtmlHeadElement",
    "HtmlStyleElement",
    "Element",
    "EventTarget",
    "Node",
    "NodeList",
    "CssStyleDeclaration",
    "MouseEvent",
    "WheelEvent",
    "TouchEvent",
    "TouchList",
    "Touch",
    "DomRect",
    "Storage",
    "Navigator",
    "Clipboard",
    "Location",
    "Performance",
    "console",
    # Fetch API (used by the tracing network layer)
    "Request",
    "RequestInit",
    "RequestMode",
    "Headers",
    "Response",
    # WebGPU bindings used by the shared graph3d module
    "Gpu",
    "GpuAdapter",
    "GpuDevice",
    "GpuQueue",
    "GpuCanvasContext",
    "GpuCanvasConfiguration",
    "GpuTextureFormat",
    "GpuBuffer",
    "GpuBufferDescriptor",
    "GpuTexture",
    "GpuTextureView",
    "GpuTextureDescriptor",
    "GpuShaderModule",
    "GpuShaderModuleDescriptor",
    "GpuPipelineLayout",
    "GpuPipelineLayoutDescriptor",
    "GpuBindGroupLayout",
    "GpuBindGroupLayoutDescriptor",
    "GpuBindGroup",
    "GpuBindGroupDescriptor",
    "GpuRenderPipeline",
    "GpuRenderPipelineDescriptor",
    "GpuCommandEncoder",
    "GpuCommandEncoderDescriptor",
    "GpuCommandBuffer",
    "GpuRenderPassEncoder",
    "GpuRenderPassDescriptor",
] }

