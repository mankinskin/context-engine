[package]
name = "viewer-api"
version = "0.1.0"
edition = "2021"
description = "Shared HTTP/MCP server API library for viewer tools"

[features]
default = []
ts-gen = ["context-api/ts-gen"]

[lib]
name = "viewer_api"
path = "src/lib.rs"

[dependencies]
axum = { version = "0.8", features = ["macros"] }
tokio = { version = "1", features = ["full"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
uuid = { version = "1", features = ["v4"] }
tower = { version = "0.4", features = ["util"] }

# jq query language
jaq-core = "1"
jaq-std = "1"
jaq-interpret = "1"
jaq-syn = "1"

# Domain types and log parser from context-api
context-api = { path = "../../../crates/context-api" }

tower-http = { version = "0.6", features = ["fs", "cors"] }
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }
tracing-appender = "0.2"

# Dev proxy (reverse proxy to Vite dev server)
hyper = "1"
hyper-util = { version = "0.1", features = ["client-legacy", "http1", "tokio"] }
http-body-util = "0.1"

# MCP protocol
rmcp = { version = "0.14", features = ["server", "transport-io"] }

[dev-dependencies]
axum-test = "19"
tempfile = "3"
