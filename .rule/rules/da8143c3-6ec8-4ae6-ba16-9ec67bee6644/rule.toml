title = "Planning and design tickets are not execution trackers"
state = "draft"
body = "Planning or design tickets track the creation and refinement of specs, tickets, and execution shape. Implementation tickets depend on the planning or design ticket being completed before implementation starts. Tracker or epic tickets are separate execution parents: the tracker ticket depends on the child implementation tickets and closes when those children are done. Do not use a planning or design ticket as the tracker for its own implementation work."
