[workspace]
resolver = "2"
members = [
  "memory-api/crates/audit-api",
  "memory-api/crates/memory-api",
  "memory-api/crates/ticket-api",
  "memory-api/crates/spec-api",
  "crates/context-search",
  "crates/context-insert",
  "crates/context-read",
  "crates/context-trace",
  "crates/context-trace-macros",
  "crates/context-api",
  "crates/ngrams",
  "tools/viewer/doc-viewer",
  "tools/viewer/log-viewer",
  "viewer-api/tools/viewer/viewer-api",
  "viewer-api/tools/viewer/viewer-ctl",
  "memory-viewers/ticket-viewer",
  "memory-viewers/spec-viewer",
  "memory-api/tools/http/ticket-http",
  "memory-api/tools/http/spec-http",
  "memory-api/tools/cli/audit-cli",
  "memory-api/tools/cli/ticket-cli",
  "tools/migrate-edges",
  "memory-api/tools/cli/spec-cli",
  "memory-api/tools/mcp/ticket-mcp",
  "memory-api/tools/mcp/spec-mcp",
  "memory-api/tools/mcp/audit-mcp",
  "tools/tracing-analyzer",
  "tools/dungeon-crawler",
  "tools/cli/context-cli",
  "tools/mcp/context-mcp",
  "tools/http/context-http",
  "tools/mcp/mcp-runner",
  "viewer-api/tools/viewer/viewer-api/frontend/dioxus",
  "memory-viewers/ticket-viewer/frontend/dioxus",
  "memory-viewers/spec-viewer/frontend/dioxus",
  "tools/context-editor/kernel",
  "tools/context-editor/sandbox-app",
]
exclude = ["./crates/deps/petgraph", "./crates/deps/justlog"]

[profile.dev]
debug = true
opt-level = 0

[profile.release]
opt-level = 2 # fast and small wasm

[workspace.metadata.docs.rs]
no-deps = true
